<!-- biome-ignore-all lint: generated extension panel -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AgentLayerWeb DevTools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f10;
      color: #e8e8e8;
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #222;
      background: #161618;
    }

    .toolbar-title {
      font-weight: 700;
      color: #0036fe;
      font-size: 13px;
      flex: 1;
    }

    .btn {
      background: #222;
      color: #ccc;
      border: 1px solid #333;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
    }
    .btn:hover { background: #2a2a2a; color: #fff; }
    .btn.active { background: #0036fe; color: white; border-color: #0036fe; }

    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 8px 12px;
      background: #161618;
      border-bottom: 1px solid #222;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-value { font-size: 16px; font-weight: 700; color: #0036fe; }
    .stat-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }

    .elements-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .element-card {
      background: #161618;
      border: 1px solid #222;
      padding: 8px 10px;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .element-card:hover { border-color: #0036fe44; }

    .element-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .role-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .element-id { color: #888; font-family: monospace; font-size: 11px; }
    .element-text { color: #555; font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #444;
      text-align: center;
      gap: 8px;
    }
    .empty strong { color: #666; }

    .role-colors {
      --action: #0036fe;
      --form: #42c366;
      --field: #ecb730;
      --navigation: #9061ff;
      --dialog: #eb3424;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">⬡ AgentLayerWeb Inspector</span>
    <button class="btn" id="btn-refresh">↺ Scan</button>
    <button class="btn" id="btn-overlay">⬡ Highlight</button>
    <button class="btn" id="btn-copy">⎘ Copy JSON</button>
  </div>

  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat">
      <span class="stat-value" id="stat-total">0</span>
      <span class="stat-label">Elements</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-actions">0</span>
      <span class="stat-label">Actions</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-forms">0</span>
      <span class="stat-label">Forms</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-fields">0</span>
      <span class="stat-label">Fields</span>
    </div>
  </div>

  <div class="elements-list" id="elements-list">
    <div class="empty">
      <strong>No scan yet</strong>
      <span>Click ↺ Scan to inspect this page</span>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
